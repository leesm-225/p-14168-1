<ul id="post-list">
    <!-- 여기 안에 JS로 동적으로 채움 -->
</ul>

<div>
    <a href="posts/write">글 쓰기</a>
</div>

<script>
    // 리스트를 렌더링할 대상
    const ul = document.querySelector("#post-list");

    // 서버에서 posts 데이터 가져오기
    fetch("/posts")
        .then(res => res.json())
        .then(posts => {
            posts.forEach(post => {
                // li 요소 생성
                const li = document.createElement("li");

                // 날짜 포맷 함수 (yy.MM.dd HH:mm)
                const created = new Date(post.createDate).toLocaleString("ko-KR", {
                    year: "2-digit",
                    month: "2-digit",
                    day: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false
                });

                // li 내부 HTML 템플릿
                li.innerHTML = `
                    <a href="/posts/${post.id}">
                        ${post.id} : ${post.title}
                    </a>
                    <span>${created}</span>
                `;

                ul.appendChild(li);
            });
        });
</script>
